apiVersion: v1
kind: ConfigMap
metadata:
  name: ue-config
  namespace: open5gs

data:
  open5gs-ue.yaml: |
    supi: imsi-901700000000001

    mcc: "901"
    mnc: "70"

    key: 465B5CE8B199B49FAA5F0A2EE238A6BC
    op: E8ED289DEBA952E4283B54E88E6183CA
    opType: OPC

    amf: "8000"

    imei: "356938035643803"
    imeiSv: "4370816125816151"

    gnbSearchList:
      - gnb

    sessions:
      - type: IPv4
        apn: internet

    configured-nssai:
      - sst: 1

    default-nssai:
      - sst: 1

    integrity:
      IA1: true
      IA2: true
      IA3: true

    ciphering:
      EA1: true
      EA2: true
      EA3: true

    integrityMaxRate:
      uplink: full
      downlink: full

    cipheringMaxRate:
      uplink: full
      downlink: full

    uacAic:
      mps: false
      mcs: false

    uacAcc:
      enabled: false
      normalClass: 0
      class11: false
      class12: false
      class13: false
      class14: false
  class15: false
