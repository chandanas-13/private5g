apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrf
  namespace: open5gs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrf
  template:
    metadata:
      labels:
        app: nrf
    spec:
      containers:
      - name: nrf
        image: open5gs-amf:latest   # IMPORTANT: replace if you have separate nrf image
        imagePullPolicy: Never
        command: ["/usr/local/bin/open5gs-nrfd"]
        ports:
        - containerPort: 7777
---
apiVersion: v1
kind: Service
metadata:
  name: nrf
  namespace: open5gs
spec:
  selector:
    app: nrf
  ports:
  - port: 7777
    targetPort: 7777
