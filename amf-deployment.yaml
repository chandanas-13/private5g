apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf
  namespace: open5gs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amf
  template:
    metadata:
      labels:
        app: amf
      annotations:
        version: "v2"
    spec:
      containers:
      - name: amf
        image: open5gs-amf:latest
        imagePullPolicy: IfNotPresent
        command: ["/usr/local/bin/open5gs-amfd"]
